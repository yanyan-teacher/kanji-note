      50% { transform: translateY(0) scale(1.2); }

      10% { opacity: 1; background-color: #FFF; }

        "詩を朗読してしょうかいしよう／知ってほしい、この名言／日本の文字文化": "朗:ろう:10:朗読をする。|胸:きょう:10:胸囲をはかる。|胸:むね:10:胸がどきどきする。|片:へん:4:破片がとぶ。|片:かた:4:片手をあげる。",
        "「考える」とは ／使える言葉にするために ／日本語の特徴": "将:しょう:10:将来のゆめ。|劇:げき:15:劇に出る。|皇:のう:9:天皇陛下。|后:こう:6:皇后さま。|党:とう:10:政党に所属する。|憲:けん:16:憲法を学ぶ。|陛:へい:10:天皇陛下。|閣:かく:14:内閣総理大臣。|革:かく:9:改革を進める。|革:かわ:9:革のくつ。|宗:そう:8:改宗する。|垂:すい:8:垂直な線。|垂:た:8:水が垂れる。|磁:じ:14:磁石をつかう。|層:そう:14:地層を調べる。",
        "大切にしたい言葉 ／今、私は、ぼくは": "担:たん:8:担任の先生。|担:にな:8:次代を担う。|姿:し:9:姿勢をほめられる。|姿:すがた:9:後ろ姿を見る。|補:ほ:12:補助輪をつける。|補:おぎな:12:栄養を補う。|操:そう:16:体操をする。|操:あやつ:16:人形を操る。|討:とう:10:討論会をする。|討:う:10:敵を討つ。|専:せん:9:専門家になる。|専:もっぱ:9:専ら勉強する。",
        "海の命／学習を広げよう（付録）": "潮:ちょう:15:満潮の海。|潮:しお:15:潮干狩りにいく。|針:しん:10:方針をきめる。|針:はり:10:時計の針。|穴:けつ:5:洞穴に入る。|穴:あな:5:地面に穴をほる。|灰:はい:6:灰色の雲。|済:ず:11:配布済みの紙|済:ざい:11:経済のニュース。|済:す:11:用事が済む。|奮:ふん:16:興奮する。|奮:ふる:16:勇気を奮いおこす。"
      }
    };

    const KANJI_DATA = {};
    Object.keys(RAW_DATA).forEach(grade => {
      KANJI_DATA[grade] = {};
      Object.keys(RAW_DATA[grade]).forEach(unit => {
        const rawStr = RAW_DATA[grade][unit];
        if (!rawStr) {
          KANJI_DATA[grade][unit] = [];
          return;
        }
        const items = rawStr.split('|');
        const parsedItems = [];
        items.forEach(item => {
          const parts = item.split(':');
          if(parts.length === 4) {
            parsedItems.push({ k: parts[0], y: parts[1], stroke: parseInt(parts[2]), s: parts[3] });
          }
        });
        KANJI_DATA[grade][unit] = parsedItems;
      });
    });

    const GRADE_COLORS = {
      1: '#E4000F', 2: '#F1E100', 3: '#009B48', 
      4: '#0033A6', 5: '#800080', 6: '#333333'
    };

    const GradeBox = ({ grade, onClick }) => (
      <div 
        onClick={onClick}
        className="bg-gray-700 w-full aspect-[4/3] rounded-xl border-4 border-gray-900 shadow-[4px_6px_0_rgba(0,0,0,0.5)] flex flex-col items-center justify-center relative cursor-pointer hover:-translate-y-1 hover:shadow-[6px_8px_0_rgba(0,0,0,0.4)] transition-all overflow-hidden"
      >
        <div className="absolute top-0 w-full h-1/4 bg-gray-800 border-b-4 border-gray-900 flex justify-center">
           <div className="w-16 h-3 bg-black rounded-b-lg opacity-80 mt-1"></div>
        </div>
        <span className="font-pixel text-3xl sm:text-5xl font-bold text-white mt-4 drop-shadow-md">{grade}年生</span>
      </div>
    );

    const Cartridge = ({ grade, title, onClick, isInserted }) => (
      <div 
        onClick={!isInserted ? onClick : undefined}
        className={`bg-[#D8D8D8] rounded-t-xl border-b-[6px] border-[#888888] shadow-lg flex flex-col items-center pt-2 px-2 relative transition-transform
          ${!isInserted ? 'w-full h-24 sm:h-28 cursor-pointer hover:-translate-y-1' : 'w-[190px] sm:w-[250px] h-20 sm:h-24 shadow-none'}`}
      >
        <div className="flex justify-between w-full px-4 mb-2">
          <div className="w-6 h-2 bg-[#888888] rounded-full shadow-inner"></div>
          <div className="w-6 h-2 bg-[#888888] rounded-full shadow-inner"></div>
        </div>
        <div className="w-full flex-1 mb-2 rounded border-4 border-gray-800 flex items-center justify-center shadow-inner relative overflow-hidden p-2" style={{ backgroundColor: GRADE_COLORS[grade] }}>
          <div className="absolute top-0 left-0 w-full h-1/2 bg-white/20"></div>
          <span className={`font-kyokasho text-white font-bold drop-shadow-md z-10 text-center leading-snug ${isInserted ? 'text-xs sm:text-sm' : 'text-sm sm:text-base'}`}>
            {title}
          </span>
        </div>
      </div>
    );

    const App = () => {
      const [gameState, setGameState] = useState('TITLE'); 
      const [selectedGrade, setSelectedGrade] = useState(1);
      const [selectedUnit, setSelectedUnit] = useState('');
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [userInput, setUserInput] = useState('');
      const [feedback, setFeedback] = useState(null);
      const [isDrawing, setIsDrawing] = useState(false);
      
      const [penSize, setPenSize] = useState(35);
      const [difficulty, setDifficulty] = useState(0.60);
      const [errorMessage, setErrorMessage] = useState('');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isPowerOn, setIsPowerOn] = useState(false);
      
      const bgCanvasRef = useRef(null);
      const drawCanvasRef = useRef(null);
      const inputRef = useRef(null);

      const pathsRef = useRef([]);
      const currentPathRef = useRef([]);

      const startGame = (mode) => {
        const filtered = KANJI_DATA[selectedGrade][selectedUnit] || [];
        const shuffled = [...filtered].sort(() => 0.5 - Math.random());
        
        if(shuffled.length === 0) {
            alert('この学年の問題がありません！');
            return;
        }
        setQuestions(shuffled);
        setCurrentIndex(0);
        setScore(0);
        setGameState(mode);
        setFeedback(null);
        setErrorMessage('');
        setUserInput('');
        pathsRef.current = [];
        currentPathRef.current = [];
      };

      const goToNextQuestion = (nextState) => {
        setFeedback(null);
        setErrorMessage('');
        setUserInput('');
        pathsRef.current = [];
        currentPathRef.current = [];
        
        if (currentIndex + 1 < questions.length) {
          setCurrentIndex(i => i + 1);
          setGameState(nextState);
          if (nextState === 'READ' && inputRef.current) {
            setTimeout(() => inputRef.current.focus(), 50);
          }
        } else {
          setGameState('RESULT');
        }
      };

      const selectGrade = (grade) => {
        setSelectedGrade(grade);
        setGameState('UNIT_SELECT');
      };

      const selectUnit = (unit) => {
        const data = KANJI_DATA[selectedGrade][unit];
        if(!data || data.length === 0) {
            alert('この たんげんの もんだいは まだ ありません！\n（先生にデータを追加してもらってね）');
            return;
        }
        setSelectedUnit(unit);
        setGameState('INSERTING');
        setIsPowerOn(false);
        
        setTimeout(() => {
          setIsPowerOn(true);
        }, 800);

        setTimeout(() => {
          setGameState('MENU');
        }, 1800);
      };

      const renderQuestionText = (mode) => {
        const q = questions[currentIndex];
        if (!q) return null;
        const parts = q.s.split(q.k);
        return (
          <div className="w-full text-center bg-white p-3 sm:p-5 rounded-xl border-4 border-gray-300 shadow-sm my-1 sm:my-2 relative shrink-0">
            <p className="text-2xl sm:text-4xl font-kyokasho text-gray-800 leading-normal tracking-wide">
              {parts.map((part, index) => (
                <React.Fragment key={index}>
                  {part}
                  {index < parts.length - 1 && (
                    mode === 'READ' ? (
                      <span className="border-b-4 border-[var(--sfc-red)] pb-1 mx-1 text-[var(--sfc-red)]">
                        {q.k}
                      </span>
                    ) : (
                      <span className="border-b-4 border-[var(--sfc-blue)] pb-1 mx-1 text-[var(--sfc-blue)]">
                        {q.y}
                      </span>
                    )
                  )}
                </React.Fragment>
              ))}
            </p>
            {/* ★修正：読む問題でのエラーメッセージ（正しい読み方）表示に対応 */}
            {feedback && gameState === 'READ' && (
              <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-50">
                <span className="text-[7rem] sm:text-[9rem] text-[var(--sfc-red)] drop-shadow-xl opacity-90 leading-none">
                  {feedback}
                </span>
                {errorMessage && (
                  <div className="mt-2 bg-white/95 px-3 py-1 sm:px-4 sm:py-2 rounded-xl border-4 border-[var(--sfc-red)] text-[var(--sfc-red)] font-pixel text-xs sm:text-base text-center whitespace-pre-wrap shadow-lg">
                    {errorMessage}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      // ★修正：「読む」で間違えた際に、正しい読み方を表示し、待機時間を長くする
      const checkReading = () => {
        if(!userInput) return;
        const currentQ = questions[currentIndex];
        const normalize = (str) => str.replace(/[\u30a1-\u30f6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60));
        const isCorrect = normalize(userInput) === normalize(currentQ.y);
        
        if (isCorrect) {
          setFeedback('⭕️');
          setScore(s => s + 1);
          setTimeout(() => {
            goToNextQuestion('READ');
          }, 1500); // 正解時は1.5秒で次へ
        } else {
          setFeedback('❌');
          setErrorMessage(`せいかいは「${currentQ.y}」だよ！`);
          setTimeout(() => {
            goToNextQuestion('READ');
          }, 2500); // 不正解時は2.5秒待ってから次へ
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && feedback === null && !e.nativeEvent.isComposing) {
          checkReading();
        }
      };

      useEffect(() => {
        if (gameState === 'READ' && inputRef.current && feedback === null) {
          inputRef.current.focus();
        }
      }, [gameState, currentIndex, feedback]);

      const CANVAS_SIZE = 400;

      useEffect(() => {
        if ((gameState === 'WRITE' || gameState === 'PRACTICE') && drawCanvasRef.current && bgCanvasRef.current && questions[currentIndex]) {
          clearCanvas(gameState);
        }
      }, [gameState, currentIndex, questions]);

      const clearCanvas = (currentState) => {
        pathsRef.current = [];
        currentPathRef.current = [];
        
        const drawCanvas = drawCanvasRef.current;
        const drawCtx = drawCanvas.getContext('2d');
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        
        const bgCanvas = bgCanvasRef.current;
        const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        bgCtx.fillStyle = '#FFFFFF';
        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

        bgCtx.save();
        bgCtx.strokeStyle = '#4ADE80';
        bgCtx.lineWidth = 3;
        bgCtx.setLineDash([10, 10]);
        bgCtx.beginPath();
        bgCtx.moveTo(bgCanvas.width / 2, 0);
        bgCtx.lineTo(bgCanvas.width / 2, bgCanvas.height);
        bgCtx.moveTo(0, bgCanvas.height / 2);
        bgCtx.lineTo(bgCanvas.width, bgCanvas.height / 2);
        bgCtx.stroke();
        bgCtx.restore();

        if (currentState === 'PRACTICE') {
          bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
          bgCtx.textAlign = 'center';
          bgCtx.textBaseline = 'middle';
          bgCtx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
          bgCtx.fillText(questions[currentIndex].k, bgCanvas.width / 2, bgCanvas.height / 2);
        }
      };

      const getCoordinates = (e) => {
        const canvas = drawCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e) => {
        setIsDrawing(true);
        const { x, y } = getCoordinates(e);
        currentPathRef.current = [{ x, y }];
        
        const ctx = drawCanvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + 0.1); 
        ctx.lineWidth = penSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#374151';
        ctx.stroke();
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const { x, y } = getCoordinates(e);
        currentPathRef.current.push({ x, y });
        
        const ctx = drawCanvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.lineWidth = penSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#374151';
        ctx.stroke();
      };

      const stopDrawing = () => {
        if (!isDrawing) return;
        setIsDrawing(false);
        if (currentPathRef.current.length > 0) {
          pathsRef.current.push([...currentPathRef.current]);
          currentPathRef.current = [];
        }
      };

      const checkWriting = () => {
        const width = CANVAS_SIZE;
        const height = CANVAS_SIZE;

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        let totalPoints = 0;
        
        const halfPen = penSize / 2;

        pathsRef.current.forEach(path => {
          path.forEach(pt => {
            if (pt.x - halfPen < minX) minX = pt.x - halfPen;
            if (pt.x + halfPen > maxX) maxX = pt.x + halfPen;
            if (pt.y - halfPen < minY) minY = pt.y - halfPen;
            if (pt.y + halfPen > maxY) maxY = pt.y + halfPen;
            totalPoints++;
          });
        });

        if (totalPoints < 2) {
          setFeedback('❌');
          setErrorMessage('かいていないよ！');
          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
            setGameState('PRACTICE');
          }, 2500);
          return;
        }

        const userW = maxX - minX;
        const userH = maxY - minY;
        const userCx = minX + userW / 2;
        const userCy = minY + userH / 2;

        const TARGET_SIZE = 340; 
        const effectiveW = Math.max(userW, 10); 
        const effectiveH = Math.max(userH, 10);
        let scale = TARGET_SIZE / Math.max(effectiveW, effectiveH);
        
        if (scale > 10) scale = 1;

        const normalizedPaths = pathsRef.current.map(path => {
          return path.map(pt => {
            return {
              x: (pt.x - userCx) * scale + (width / 2),
              y: (pt.y - userCy) * scale + (height / 2)
            };
          });
        });

        const targetCanvas = document.createElement('canvas');
        targetCanvas.width = width;
        targetCanvas.height = height;
        const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
        
        targetCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
        targetCtx.textAlign = 'center';
        targetCtx.textBaseline = 'middle';
        targetCtx.fillStyle = '#FF0000';
        targetCtx.fillText(questions[currentIndex].k, width / 2, height / 2);
        
        targetCtx.lineWidth = 15;
        targetCtx.strokeStyle = '#FF0000';
        targetCtx.strokeText(questions[currentIndex].k, width / 2, height / 2);

        const targetData = targetCtx.getImageData(0, 0, width, height).data;

        const userCanvas = document.createElement('canvas');
        userCanvas.width = width;
        userCanvas.height = height;
        const userCtx = userCanvas.getContext('2d', { willReadFrequently: true });
        
        userCtx.lineWidth = 90; 
        userCtx.lineCap = 'round';
        userCtx.lineJoin = 'round';
        userCtx.strokeStyle = '#000000';

        normalizedPaths.forEach(path => {
          if (path.length === 0) return;
          userCtx.beginPath();
          userCtx.moveTo(path[0].x, path[0].y);
          if (path.length === 1) {
            userCtx.lineTo(path[0].x, path[0].y + 0.1);
          } else {
            for (let i = 1; i < path.length; i++) {
              userCtx.lineTo(path[i].x, path[i].y);
            }
          }
          userCtx.stroke();
        });

        const userData = userCtx.getImageData(0, 0, width, height).data;

        let targetPixelCount = 0;
        let userPixelCount = 0;
        let coveredPixelCount = 0;
        const step = 4;

        for (let y = 0; y < height; y += step) {
          for (let x = 0; x < width; x += step) {
            const i = (y * width + x) * 4;
            const isTarget = targetData[i + 3] > 50;
            const isUser = userData[i + 3] > 50;

            if (isTarget) targetPixelCount++;
            if (isUser) userPixelCount++;
            if (isTarget && isUser) coveredPixelCount++;
          }
        }

        const coverRate = targetPixelCount === 0 ? 0 : coveredPixelCount / targetPixelCount;
        
        const isNotCheating = userPixelCount < targetPixelCount * 3.5;

        const userStrokeCount = pathsRef.current.length;
        const targetStrokeCount = questions[currentIndex].stroke;
        const isStrokeCorrect = userStrokeCount === targetStrokeCount;

        let finalDifficulty = difficulty;
        if (targetStrokeCount <= 2) {
          finalDifficulty -= 0.15; 
        } else if (targetStrokeCount <= 4) {
          finalDifficulty -= 0.10; 
        } else if (targetStrokeCount <= 6) {
          finalDifficulty -= 0.05; 
        }
        finalDifficulty = Math.max(0.30, finalDifficulty);

        const isCorrect = isStrokeCorrect && (coverRate >= finalDifficulty) && isNotCheating; 
        
        if (isCorrect) {
          setFeedback('⭕️');
          setScore(s => s + 1);
          setTimeout(() => {
            goToNextQuestion('WRITE');
          }, 1500);
        } else {
          setFeedback('❌');
          if (!isStrokeCorrect) {
            setErrorMessage(`かくすう が ちがうよ！\n(せいかいは ${targetStrokeCount} かく)`);
          } else {
            setErrorMessage(`かたちが すこし ちがうみたい`);
          }
          
          const bgCanvas = bgCanvasRef.current;
          if (bgCanvas) {
            const bgCtx = bgCanvas.getContext('2d');
            bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
            bgCtx.textAlign = 'center';
            bgCtx.textBaseline = 'middle';
            bgCtx.fillStyle = 'rgba(228, 0, 15, 0.4)'; 
            bgCtx.fillText(questions[currentIndex].k, bgCanvas.width / 2, bgCanvas.height / 2);
          }

          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
            setGameState('PRACTICE'); 
          }, 2500);
        }
      };

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative overflow-hidden bg-[var(--sfc-gray-light)]">
          
          {(gameState === 'TITLE' || gameState === 'UNIT_SELECT') && (
            <button 
              onClick={() => setIsSettingsOpen(true)}
              className="absolute top-4 right-4 sm:top-6 sm:right-6 bg-gray-800 text-white w-12 h-12 sm:w-14 sm:h-14 rounded-full flex items-center justify-center text-2xl sm:text-3xl shadow-[0_6px_0_#000] active:translate-y-1 active:shadow-none transition-all z-40"
            >
              ⚙️
            </button>
          )}

          {isSettingsOpen && (
            <div className="absolute inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white p-6 sm:p-8 rounded-2xl border-8 border-gray-800 shadow-2xl w-full max-w-md relative animate-pop-in">
                <h2 className="font-pixel text-3xl font-bold mb-6 text-center text-gray-800 border-b-4 border-gray-300 pb-2">せってい</h2>
                
                <div className="mb-8">
                  <p className="font-pixel text-gray-600 mb-4 text-xl text-center">ペンの ふとさ</p>
                  <div className="flex justify-center gap-4 sm:gap-6">
                    {[
                      { size: 15, label: 'ほそい' },
                      { size: 35, label: 'ふつう' },
                      { size: 55, label: 'ふとい' }
                    ].map(p => (
                      <button
                        key={p.size}
                        onClick={() => setPenSize(p.size)}
                        className={`w-20 h-20 rounded-full flex flex-col items-center justify-center border-4 transition-all ${
                          penSize === p.size 
                            ? 'bg-gray-600 border-gray-800 text-white shadow-inner scale-110' 
                            : 'bg-white border-gray-400 text-gray-400 hover:bg-gray-100'
                        }`}
                      >
                        <div className="bg-current rounded-full mb-1" style={{ width: p.size/2.5, height: p.size/2.5 }}></div>
                        <span className="font-pixel text-xs">{p.label}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div className="mb-10">
                  <p className="font-pixel text-gray-600 mb-4 text-xl text-center">はんていの きびしさ</p>
                  <div className="flex justify-center gap-2 sm:gap-4">
                    {[
                      { rate: 0.45, label: 'かんたん' },
                      { rate: 0.60, label: 'ふつう' },
                      { rate: 0.75, label: 'むずかしい' }
                    ].map(d => (
                      <button
                        key={d.rate}
                        onClick={() => setDifficulty(d.rate)}
                        className={`px-3 py-3 sm:px-4 sm:py-4 font-pixel text-sm sm:text-base rounded-xl border-b-4 transition-all ${
                          difficulty === d.rate
                            ? 'bg-gray-600 border-gray-800 text-white translate-y-1 border-b-0 shadow-inner'
                            : 'bg-white border-gray-400 text-gray-600 hover:bg-gray-100'
                        }`}
                      >
                        {d.label}
                      </button>
                    ))}
                  </div>
                </div>

                <button 
                  onClick={() => setIsSettingsOpen(false)}
                  className="w-full bg-[var(--sfc-red)] text-white font-pixel py-4 rounded-full shadow-[0_6px_0_#8B0000] active:translate-y-1 active:shadow-none text-2xl transition-all"
                >
                  とじる
                </button>
              </div>
            </div>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full h-full flex flex-col items-center justify-center p-4">
              <h1 className="font-pixel text-4xl sm:text-5xl font-bold mb-2 text-gray-800 drop-shadow-md">カンジクエスト</h1>
              <p className="font-pixel text-gray-600 mb-8">がくねん を えらんでね</p>
              <div className="grid grid-cols-2 md:grid-cols-3 gap-6 sm:gap-10 w-full max-w-2xl">
                {[1, 2, 3, 4, 5, 6].map(grade => (
                  <GradeBox key={grade} grade={grade} onClick={() => selectGrade(grade)} />
                ))}
              </div>
            </div>
          )}

          {gameState === 'UNIT_SELECT' && (
            <div className="w-full h-full flex flex-col items-center p-4 overflow-y-auto pb-20">
              <div className="w-full max-w-4xl flex flex-col sm:flex-row justify-between items-center mb-6 mt-4 gap-4">
                <button onClick={() => setGameState('TITLE')} className="font-pixel text-gray-600 underline text-lg">← がくねんをえらびなおす</button>
                <h2 className="font-pixel text-2xl font-bold text-gray-800">{selectedGrade}ねんせい の カセット</h2>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 w-full max-w-4xl">
                {Object.keys(KANJI_DATA[selectedGrade]).map(unit => (
                  <Cartridge key={unit} grade={selectedGrade} title={unit} onClick={() => selectUnit(unit)} />
                ))}
              </div>
            </div>
          )}

          {gameState === 'INSERTING' && (
            <div className="w-full h-full bg-[#1A1A1A] flex items-end justify-center pb-10 sm:pb-20 relative overflow-hidden">
              <div className="relative w-[300px] sm:w-[400px] h-64 bg-[#D0D0D0] rounded-t-[40px] border-t-[10px] border-x-[10px] border-gray-400 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] flex flex-col items-center pt-4 z-20">
                
                <div className="absolute top-[-60px] sm:top-[-70px] z-10 animate-insert">
                  <Cartridge grade={selectedGrade} title={selectedUnit} isInserted={true} />
                </div>

                <div className="w-[200px] sm:w-[260px] h-8 bg-gray-900 rounded-full shadow-[inset_0_4px_8px_rgba(0,0,0,0.8)] absolute top-6 z-0"></div>
                
                <div className="w-[220px] sm:w-[280px] h-12 bg-[#B0B0B0] rounded-t-xl absolute top-8 z-30 shadow-md flex justify-center border-t border-gray-300">
                   <div className="w-[180px] sm:w-[240px] h-2 bg-gray-800 rounded-full mt-2 opacity-50 shadow-inner"></div>
                </div>
                
                <div className="w-full h-full mt-16 bg-[#C8C8C8] rounded-t-3xl z-30 flex relative border-t-2 border-white shadow-inner pt-6 px-4">
                  <div className="flex-1 flex flex-col items-center">
                    <div className="w-10 sm:w-12 h-14 sm:h-16 bg-gray-400 rounded-lg shadow-[inset_0_4px_6px_rgba(0,0,0,0.3)] p-1 relative border-b-2 border-white overflow-hidden">
                      <div className={`absolute left-1 right-1 h-6 rounded shadow-[0_2px_4px_rgba(0,0,0,0.4)] transition-all duration-150 ease-in-out ${isPowerOn ? 'top-1 bg-gray-200' : 'bottom-1 bg-gray-500'}`}></div>
                    </div>
                    <span className="font-pixel text-[10px] sm:text-xs text-gray-500 mt-2 font-bold tracking-wider">POWER</span>
                    <div className={`w-3 h-3 rounded-full mt-3 transition-colors duration-150 ${isPowerOn ? 'bg-red-500 shadow-[0_0_10px_#F00]' : 'bg-red-900 shadow-inner'}`}></div>
                  </div>
                  <div className="flex-1 flex justify-center pt-2">
                    <div className="w-20 sm:w-24 h-8 sm:h-10 bg-gray-400 rounded-full shadow-[0_4px_0_#999] border-t border-gray-200 flex items-center justify-center">
                      <span className="font-pixel text-[10px] sm:text-xs text-gray-600 font-bold tracking-wider">EJECT</span>
                    </div>
                  </div>
                  <div className="flex-1 flex flex-col items-center">
                     <div className="w-10 sm:w-12 h-14 sm:h-16 bg-gray-400 rounded-lg shadow-[inset_0_4px_6px_rgba(0,0,0,0.3)] p-1 relative border-b-2 border-white">
                      <div className="absolute left-1 right-1 h-6 bg-gray-500 rounded bottom-1 shadow-[0_2px_4px_rgba(0,0,0,0.4)]"></div>
                    </div>
                    <span className="font-pixel text-[10px] sm:text-xs text-gray-500 mt-2 font-bold tracking-wider">RESET</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {['MENU', 'READ', 'WRITE', 'PRACTICE', 'RESULT'].includes(gameState) && (
            <div className="w-full h-full bg-[var(--tv-bg)] flex flex-col p-2 sm:p-4 animate-tv-on text-white">
              <div className="w-full max-w-4xl mx-auto flex-1 flex flex-col items-center justify-center border-8 border-gray-800 rounded-2xl sm:rounded-3xl bg-gray-100 text-gray-900 p-2 sm:p-4 shadow-[0_0_50px_rgba(0,0,0,0.8)_inset] overflow-hidden relative">
                
                {gameState === 'MENU' && (
                  <div className="text-center w-full relative h-full flex flex-col items-center justify-center">
                    <button 
                      onClick={() => {
                        setIsPowerOn(false);
                        setGameState('UNIT_SELECT');
                      }} 
                      className="absolute top-0 left-0 font-pixel text-gray-500 underline hover:text-gray-800"
                    >
                      ← カセットを ぬく
                    </button>
                    
                    <p className="font-kyokasho font-bold text-gray-500 mb-2 mt-8">{selectedGrade}年生</p>
                    <h2 className="font-kyokasho text-xl sm:text-2xl font-bold mb-8 sm:mb-12 border-b-4 pb-2 sm:pb-4 inline-block border-gray-400 px-4">
                      {selectedUnit}
                    </h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8 w-full max-w-2xl mx-auto">
                      <button onClick={() => startGame('READ')} className="group flex flex-col items-center">
                        <div className="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-[var(--sfc-red)] shadow-[0_8px_0_#8B0000] group-active:translate-y-2 group-active:shadow-none transition-all flex items-center justify-center border-4 border-gray-200 mb-4">
                          <span className="font-pixel text-white text-3xl font-bold">A</span>
                        </div>
                        <span className="font-pixel text-2xl font-bold text-gray-800">よむ</span>
                      </button>
                      <button onClick={() => startGame('WRITE')} className="group flex flex-col items-center">
                        <div className="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-[var(--sfc-yellow)] shadow-[0_8px_0_#B8860B] group-active:translate-y-2 group-active:shadow-none transition-all flex items-center justify-center border-4 border-gray-200 mb-4">
                          <span className="font-pixel text-gray-800 text-3xl font-bold">B</span>
                        </div>
                        <span className="font-pixel text-2xl font-bold text-gray-800">かく</span>
                      </button>
                    </div>
                  </div>
                )}

                {gameState === 'READ' && questions.length > 0 && (
                  <div className="w-full h-full flex flex-col items-center justify-between pt-2">
                    <div className="w-full flex justify-between items-center font-pixel text-lg sm:text-xl text-gray-500 mb-2 px-2">
                      <button 
                        onClick={() => {
                          setFeedback(null);
                          setUserInput('');
                          setGameState('MENU');
                        }} 
                        className="underline text-sm sm:text-base hover:text-gray-800"
                        disabled={feedback !== null}
                      >
                        ←やめる
                      </button>
                      <div className="flex gap-4">
                        <span>{currentIndex + 1} / {questions.length}</span>
                        <span>スコア: {score}</span>
                      </div>
                    </div>
                    
                    {renderQuestionText('READ')}
                    
                    <div className="w-full max-w-lg flex flex-col gap-3 sm:gap-4 mt-auto mb-2 px-2">
                      <p className="font-pixel text-center text-sm sm:text-lg text-gray-600">あかい せん の よみを ひらがな で いれてね</p>
                      <input 
                        ref={inputRef}
                        type="text" 
                        value={userInput}
                        onChange={(e) => setUserInput(e.target.value)}
                        onKeyDown={handleKeyDown}
                        disabled={feedback !== null}
                        className="w-full p-3 sm:p-4 rounded-xl border-4 border-gray-300 font-bold text-xl sm:text-2xl text-center focus:outline-none focus:border-[var(--sfc-blue)]"
                        placeholder="ひらがな"
                      />
                      <button 
                        onClick={checkReading}
                        disabled={feedback !== null}
                        className="bg-[var(--sfc-blue)] text-white font-pixel py-3 sm:py-4 px-6 rounded-full shadow-[0_6px_0_#000080] active:translate-y-1 active:shadow-none flex items-center justify-center gap-3 text-lg sm:text-xl transition-all"
                      >
                        <span className="bg-white text-[var(--sfc-blue)] rounded-full w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-xs sm:text-sm font-bold">X</span>
                        けってい (Enter)
                      </button>
                    </div>
                  </div>
                )}

                {(gameState === 'WRITE' || gameState === 'PRACTICE') && questions.length > 0 && (
                  <div className="w-full h-full flex flex-col items-center justify-between pt-1 sm:pt-2">
                    <div className="w-full flex justify-between items-center font-pixel text-lg sm:text-xl text-gray-500 mb-1 px-2">
                      <button 
                        onClick={() => {
                          setFeedback(null);
                          setErrorMessage('');
                          pathsRef.current = [];
                          currentPathRef.current = [];
                          setGameState('MENU');
                        }} 
                        className="underline text-sm sm:text-base hover:text-gray-800"
                        disabled={feedback !== null}
                      >
                        ←やめる
                      </button>
                      <div className="flex gap-4">
                        {gameState === 'PRACTICE' ? (
                          <span className="text-[var(--sfc-red)] font-bold animate-pulse">れんしゅう モード</span>
                        ) : (
                          <span>{currentIndex + 1} / {questions.length}</span>
                        )}
                        <span>スコア: {score}</span>
                      </div>
                    </div>
                    
                    {renderQuestionText('WRITE')}
                    
                    <div 
                      className="relative border-4 border-green-600 rounded-lg aspect-square shadow-md overflow-hidden bg-white shrink-0 my-2" 
                      style={{ width: '100%', maxWidth: 'min(400px, 45vh)' }}
                    >
                      <canvas
                        ref={bgCanvasRef}
                        width={CANVAS_SIZE}
                        height={CANVAS_SIZE}
                        className="absolute top-0 left-0 w-full h-full pointer-events-none"
                      />
                      <canvas
                        ref={drawCanvasRef}
                        width={CANVAS_SIZE}
                        height={CANVAS_SIZE}
                        onMouseDown={startDrawing}
                        onMouseMove={draw}
                        onMouseUp={stopDrawing}
                        onMouseOut={stopDrawing}
                        onTouchStart={startDrawing}
                        onTouchMove={draw}
                        onTouchEnd={stopDrawing}
                        className="cursor-crosshair absolute top-0 left-0 w-full h-full"
                      />
                      
                      {feedback && gameState === 'WRITE' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-50">
                          <span className="text-[7rem] sm:text-[9rem] text-[var(--sfc-red)] drop-shadow-xl opacity-90 leading-none">
                            {feedback}
                          </span>
                          {errorMessage && (
                            <div className="mt-2 bg-white/95 px-3 py-1 sm:px-4 sm:py-2 rounded-xl border-4 border-[var(--sfc-red)] text-[var(--sfc-red)] font-pixel text-xs sm:text-base text-center whitespace-pre-wrap shadow-lg">
                              {errorMessage}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                    
                    <div className="flex gap-3 sm:gap-4 w-full justify-center mt-auto pb-1 px-2">
                      <button 
                        onClick={() => clearCanvas(gameState)}
                        disabled={feedback !== null}
                        className="bg-[var(--sfc-green)] text-white font-pixel py-3 px-6 sm:px-8 rounded-full shadow-[0_6px_0_#006400] active:translate-y-1 active:shadow-none flex items-center gap-2 sm:gap-3 text-base sm:text-xl transition-all"
                      >
                        <span className="bg-white text-[var(--sfc-green)] rounded-full w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-xs font-bold">Y</span> 
                        {gameState === 'PRACTICE' ? 'もういちど' : 'けす'}
                      </button>
                      
                      {gameState === 'WRITE' ? (
                        <button 
                          onClick={checkWriting}
                          disabled={feedback !== null}
                          className="bg-[var(--sfc-red)] text-white font-pixel py-3 px-6 sm:px-8 rounded-full shadow-[0_6px_0_#8B0000] active:translate-y-1 active:shadow-none flex items-center gap-2 sm:gap-3 text-base sm:text-xl transition-all"
                        >
                          <span className="bg-white text-[var(--sfc-red)] rounded-full w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-xs font-bold">A</span> 
                          できた！
                        </button>
                      ) : (
                        <button 
                          onClick={() => goToNextQuestion('WRITE')}
                          className="bg-[var(--sfc-blue)] text-white font-pixel py-3 px-6 sm:px-8 rounded-full shadow-[0_6px_0_#000080] active:translate-y-1 active:shadow-none flex items-center gap-2 sm:gap-3 text-base sm:text-xl transition-all"
                        >
                          <span className="bg-white text-[var(--sfc-blue)] rounded-full w-6 h-6 sm:w-8 sm:h-8 flex items-center justify-center text-xs font-bold">A</span> 
                          つぎへ
                        </button>
                      )}
                    </div>
                  </div>
                )}

                {gameState === 'RESULT' && (
                  <div className="text-center flex flex-col items-center justify-center h-full w-full">
                    <h2 className="font-pixel text-3xl sm:text-4xl font-bold mb-8">けっか はっぴょう</h2>
                    <p className="text-[6rem] sm:text-[8rem] font-bold text-[var(--sfc-red)] mb-8 leading-none drop-shadow-md">
                      {score} <span className="text-3xl sm:text-4xl text-gray-800">てん</span>
                    </p>
                    <p className="font-pixel text-xl sm:text-2xl mb-12 text-gray-600">
                      {score === questions.length ? 'パーフェクト！すごいぞ！' : 'よくがんばったね！'}
                    </p>
                    <button 
                      onClick={() => setGameState('UNIT_SELECT')}
                      className="bg-gray-800 text-white font-pixel px-8 py-4 rounded-full shadow-[0_6px_0_#000] active:translate-y-1 active:shadow-none text-xl"
                    >
                      メニューにもどる
                    </button>
                  </div>
                )}

              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
